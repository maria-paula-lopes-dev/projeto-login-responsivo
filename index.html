<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Responsivo</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/responsividade.css">
</head>
<body>
    <main class="main-container">
        <section class="login-container">
            <div id="imagem-container">
            </div>

            <form class="form-login" action="#" method="post" autocomplete="on">
                <div class="campos">
                    <label for="idEmail">Login</label>
                    <input type="email" name="email" id="idEmail" required placeholder="Seu e-mail" autocomplete="email" minlength="8" maxlength="30">

                    <span class="material-symbols-outlined">account_circle</span>
                </div>

                <div class="campos">                    
                    <label for="idSenha">Senha</label>
                    <input type="password" name="senha" id="idSenha" required placeholder="Sua senha" minlength="8" maxlength="15">

                    <span class="material-symbols-outlined">key</span>
                </div>

                <button type="submit" class="btn-login">
                    Entrar
                </button>

                <a href="#" id="link">
                    Esqueci a Senha
                </a>
            </form>
        </section>
    </main>
</body>
</html>
